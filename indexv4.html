<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI文字起こし">
<meta name="theme-color" content="#1a1a2e">
<title>AI文字起こし - 陽だまり整骨院</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-hover: #1a2744;
  --accent-warm: #e8a838;
  --accent-warm-dim: rgba(232, 168, 56, 0.15);
  --accent-green: #66bb6a;
  --accent-pink: #ef5350;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a8;
  --text-dim: #555570;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  min-height: 100dvh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(232,168,56,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(79,195,247,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.app-container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
.header { padding: 52px 0 16px; text-align: center; }
.header-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--accent-warm), #f4c460);
  border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(232,168,56,0.3);
}
.header h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text-primary), var(--accent-warm));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-weight: 300; }
.settings-btn {
  position: absolute; top: 52px; right: 16px; width: 36px; height: 36px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-secondary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 10;
}
.settings-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* Page tabs */
.page-tabs {
  display: flex; margin-bottom: 20px;
  background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 3px; border: 1px solid var(--border);
}
.page-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; border-radius: 8px;
  transition: all 0.2s; background: none; border: none;
}
.page-tab.active { background: var(--accent-warm); color: #1a1a2e; font-weight: 700; }
.page-tab .tab-badge {
  display: inline-block; background: rgba(255,255,255,0.2); border-radius: 10px;
  padding: 0 6px; font-size: 10px; margin-left: 4px;
}
.page-tab.active .tab-badge { background: rgba(0,0,0,0.2); }

.page-content { display: none; }
.page-content.active { display: block; }

/* Settings */
.settings-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
  display: none; animation: slideDown 0.3s ease;
}
.settings-panel.active { display: block; }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.settings-panel label {
  display: block; font-size: 11px; font-weight: 500; color: var(--text-secondary);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
}
.settings-panel .label-sub { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; text-transform: none; letter-spacing: 0; }
.settings-panel input {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-bottom: 16px;
}
.settings-panel input:focus { outline: none; border-color: var(--accent-warm); }
.settings-panel input::placeholder { color: var(--text-dim); }
.save-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent-warm), #f4c460);
  color: #1a1a2e; border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.save-btn:active { transform: scale(0.98); }

/* Upload */
.upload-area {
  background: var(--bg-card); border: 2px dashed rgba(232,168,56,0.25);
  border-radius: var(--radius); padding: 40px 20px; text-align: center;
  cursor: pointer; transition: all 0.3s; margin-bottom: 20px;
}
.upload-area:hover, .upload-area.dragover { border-color: var(--accent-warm); background: var(--bg-card-hover); }
.upload-area.has-file { border-color: var(--accent-green); border-style: solid; background: rgba(102,187,106,0.05); }
.upload-icon { font-size: 40px; margin-bottom: 12px; display: block; }
.upload-text { font-size: 14px; font-weight: 500; }
.upload-sub { font-size: 11px; color: var(--text-secondary); }
.file-info { display: none; align-items: center; gap: 12px; padding: 4px 0; }
.file-info.active { display: flex; }
.file-info-icon { width: 44px; height: 44px; background: rgba(102,187,106,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.file-info-text { text-align: left; flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 11px; color: var(--text-secondary); }
.file-remove { width: 32px; height: 32px; background: rgba(239,83,80,0.1); border: none; border-radius: 8px; color: var(--accent-pink); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
input[type="file"] { display: none; }

/* Mode */
.mode-section { margin-bottom: 20px; }
.section-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
.mode-card:hover { background: var(--bg-card-hover); }
.mode-card.selected { border-color: var(--accent-warm); background: var(--accent-warm-dim); box-shadow: 0 0 20px rgba(232,168,56,0.1); }
.mode-emoji { font-size: 24px; display: block; margin-bottom: 6px; }
.mode-name { font-size: 13px; font-weight: 500; }
.mode-desc { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

/* Process button */
.process-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--accent-warm), #f4c460);
  color: #1a1a2e; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(232,168,56,0.25); letter-spacing: 0.5px;
}
.process-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
.process-btn:not(:disabled):active { transform: scale(0.98); }

/* Progress */
.progress-section { display: none; margin-bottom: 20px; }
.progress-section.active { display: block; }
.progress-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; }
.progress-step { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 13px; color: var(--text-dim); }
.progress-step.active { color: var(--accent-warm); }
.progress-step.done { color: var(--accent-green); }
.progress-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-primary); border: 2px solid var(--text-dim); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; transition: all 0.3s; }
.progress-step.active .progress-dot { border-color: var(--accent-warm); background: var(--accent-warm-dim); }
.progress-step.done .progress-dot { border-color: var(--accent-green); background: rgba(102,187,106,0.15); }
.spinner { width: 18px; height: 18px; border: 2px solid transparent; border-top-color: var(--accent-warm); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Result */
.result-section { display: none; margin-bottom: 20px; }
.result-section.active { display: block; }
.result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.result-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.result-title { font-size: 14px; font-weight: 700; }
.action-btn { padding: 6px 14px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.action-btn:hover { color: var(--text-primary); border-color: var(--accent-warm); }
.result-tabs { display: flex; border-bottom: 1px solid var(--border); }
.result-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
.result-tab.active { color: var(--accent-warm); border-bottom-color: var(--accent-warm); }
.result-content { padding: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
.result-content::-webkit-scrollbar { width: 4px; }
.result-content::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

/* Error & Toast */
.error-msg { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 12px; color: var(--accent-pink); margin-bottom: 16px; display: none; line-height: 1.6; }
.error-msg.active { display: block; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg-card); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 500; z-index: 100; transition: transform 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============ HISTORY ============ */
.history-empty {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.history-empty-icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5; }
.history-empty-text { font-size: 14px; }

.history-filter {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-chip {
  padding: 6px 14px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text-secondary); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.filter-chip.active { background: var(--accent-warm-dim); border-color: var(--accent-warm); color: var(--accent-warm); }

.history-list { display: flex; flex-direction: column; gap: 10px; }

.history-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
}
.history-item:hover { background: var(--bg-card-hover); border-color: rgba(232,168,56,0.2); }

.history-item-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.history-item-mode {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; background: var(--accent-warm-dim); color: var(--accent-warm);
}
.history-item-date { font-size: 11px; color: var(--text-dim); }
.history-item-filename { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item-preview { font-size: 12px; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.history-item-actions { display: flex; gap: 8px; margin-top: 8px; }
.history-delete {
  padding: 4px 10px; background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.2);
  border-radius: 6px; color: var(--accent-pink); font-size: 11px; cursor: pointer;
}
.history-delete:hover { background: rgba(239,83,80,0.15); }
.history-rename {
  padding: 4px 10px; background: rgba(232,168,56,0.08); border: 1px solid rgba(232,168,56,0.2);
  border-radius: 6px; color: var(--accent-warm); font-size: 11px; cursor: pointer;
}
.history-rename:hover { background: rgba(232,168,56,0.15); }
.history-item-title {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.title-edit-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
}
.title-edit-input {
  flex: 1; background: var(--bg-primary); border: 1px solid var(--accent-warm);
  border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 600;
}
.title-edit-input:focus { outline: none; box-shadow: 0 0 0 2px var(--accent-warm-dim); }
.title-edit-save {
  padding: 10px 16px; background: var(--accent-warm); color: #1a1a2e;
  border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.title-display-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.title-display-text {
  font-size: 16px; font-weight: 700; flex: 1;
}
.title-edit-btn {
  padding: 4px 10px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-secondary); font-size: 11px; cursor: pointer;
}
.title-edit-btn:hover { border-color: var(--accent-warm); color: var(--accent-warm); }

/* History detail view */
.history-detail { display: none; }
.history-detail.active { display: block; }
.history-back {
  display: flex; align-items: center; gap: 6px; padding: 8px 0;
  color: var(--accent-warm); font-size: 13px; font-weight: 500;
  cursor: pointer; margin-bottom: 12px; background: none; border: none;
}
.history-back:hover { text-decoration: underline; }

.history-detail-meta {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 12px;
  display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px;
}
.meta-item { color: var(--text-secondary); }
.meta-item span { color: var(--text-primary); font-weight: 500; }

@media (max-width: 360px) { .mode-grid { gap: 8px; } .mode-card { padding: 12px 10px; } }
@supports (padding-top: env(safe-area-inset-top)) {
  .header { padding-top: calc(52px + env(safe-area-inset-top)); }
  .settings-btn { top: calc(52px + env(safe-area-inset-top)); }
}
</style>
</head>
<body>
<div class="app-container">
  <button class="settings-btn" onclick="toggleSettings()">⚙</button>
  <div class="header">
    <div class="header-icon">🎙</div>
    <h1>AI文字起こし</h1>
    <p>Groq Whisper × Claude API</p>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <label>Groq API Key（無料）</label>
    <div class="label-sub">→ <a href="https://console.groq.com/keys" target="_blank" style="color:var(--accent-warm)">console.groq.com/keys</a> で取得</div>
    <input type="password" id="groqKey" placeholder="gsk_..." autocomplete="off">
    <label>Claude API Key</label>
    <input type="password" id="claudeKey" placeholder="sk-ant-..." autocomplete="off">
    <label>Slack Webhook URL（任意）</label>
    <input type="url" id="slackWebhook" placeholder="https://hooks.slack.com/..." autocomplete="off">
    <button class="save-btn" onclick="saveSettings()">💾 保存する</button>
  </div>

  <!-- Page tabs -->
  <div class="page-tabs">
    <button class="page-tab active" onclick="switchPage('new')">🎤 新規</button>
    <button class="page-tab" onclick="switchPage('history')">📚 履歴 <span class="tab-badge" id="historyBadge">0</span></button>
  </div>

  <!-- ======== NEW (recording page) ======== -->
  <div class="page-content active" id="pageNew">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div id="uploadPrompt">
        <span class="upload-icon">🎵</span>
        <div class="upload-text">音声ファイルをタップして選択</div>
        <div class="upload-sub">m4a / wav / mp3 / mp4 対応（25MB以下）</div>
      </div>
      <div class="file-info" id="fileInfo">
        <div class="file-info-icon">✅</div>
        <div class="file-info-text">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button class="file-remove" onclick="removeFile(event)">✕</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="audio/*,.m4a,.wav,.mp3,.mp4,.ogg,.webm,.aac">
    <div class="error-msg" id="errorMsg"></div>
    <div class="mode-section">
      <div class="section-label">処理モード</div>
      <div class="mode-grid">
        <div class="mode-card selected" data-mode="summary" onclick="selectMode(this)"><span class="mode-emoji">📝</span><div class="mode-name">要約</div><div class="mode-desc">シンプルな要約</div></div>
        <div class="mode-card" data-mode="karte" onclick="selectMode(this)"><span class="mode-emoji">🏥</span><div class="mode-name">カルテ</div><div class="mode-desc">施術記録形式</div></div>
        <div class="mode-card" data-mode="minutes" onclick="selectMode(this)"><span class="mode-emoji">📋</span><div class="mode-name">議事録</div><div class="mode-desc">会議・セミナー</div></div>
        <div class="mode-card" data-mode="blog" onclick="selectMode(this)"><span class="mode-emoji">✍️</span><div class="mode-name">ブログネタ</div><div class="mode-desc">記事下書き生成</div></div>
      </div>
    </div>
    <button class="process-btn" id="processBtn" onclick="processAudio()" disabled>🚀 文字起こし開始</button>
    <div class="progress-section" id="progressSection">
      <div class="progress-card">
        <div class="progress-step" id="step1"><div class="progress-dot">1</div><span>Whisperで文字起こし中...</span></div>
        <div class="progress-step" id="step2"><div class="progress-dot">2</div><span>Claudeで整形中...</span></div>
      </div>
    </div>
    <div class="result-section" id="resultSection">
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">✨ 処理完了</div>
          <div style="display:flex;gap:8px"><button class="action-btn" onclick="copyResult()">📋 コピー</button></div>
        </div>
        <div class="result-tabs">
          <button class="result-tab active" onclick="switchTab('formatted')">整形テキスト</button>
          <button class="result-tab" onclick="switchTab('transcript')">文字起こし原文</button>
        </div>
        <div class="result-content" id="resultContent"></div>
      </div>
    </div>
  </div>

  <!-- ======== HISTORY page ======== -->
  <div class="page-content" id="pageHistory">
    <!-- List view -->
    <div id="historyListView">
      <div class="history-filter" id="historyFilter">
        <button class="filter-chip active" data-filter="all" onclick="filterHistory('all', this)">すべて</button>
        <button class="filter-chip" data-filter="summary" onclick="filterHistory('summary', this)">📝 要約</button>
        <button class="filter-chip" data-filter="karte" onclick="filterHistory('karte', this)">🏥 カルテ</button>
        <button class="filter-chip" data-filter="minutes" onclick="filterHistory('minutes', this)">📋 議事録</button>
        <button class="filter-chip" data-filter="blog" onclick="filterHistory('blog', this)">✍️ ブログ</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
    <!-- Detail view -->
    <div class="history-detail" id="historyDetail">
      <button class="history-back" onclick="closeHistoryDetail()">← 一覧に戻る</button>
      <div id="historyDetailTitle"></div>
      <div class="history-detail-meta" id="historyDetailMeta"></div>
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">📄 結果</div>
          <div style="display:flex;gap:8px"><button class="action-btn" onclick="copyHistoryResult()">📋 コピー</button></div>
        </div>
        <div class="result-tabs">
          <button class="result-tab active" onclick="switchHistoryTab('formatted')">整形テキスト</button>
          <button class="result-tab" onclick="switchHistoryTab('transcript')">文字起こし原文</button>
        </div>
        <div class="result-content" id="historyDetailContent"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let selectedFile = null, selectedMode = 'summary', transcriptText = '', formattedText = '', currentTab = 'formatted';
let currentHistoryItem = null, historyTab = 'formatted', currentFilter = 'all';
const MODE_LABELS = { summary:'📝 要約', karte:'🏥 カルテ', minutes:'📋 議事録', blog:'✍️ ブログネタ' };

// ========== Settings ==========
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
function loadSettings() {
  document.getElementById('groqKey').value = localStorage.getItem('groq_api_key') || '';
  document.getElementById('claudeKey').value = localStorage.getItem('claude_api_key') || '';
  document.getElementById('slackWebhook').value = localStorage.getItem('slack_webhook') || '';
}
function saveSettings() {
  localStorage.setItem('groq_api_key', document.getElementById('groqKey').value.trim());
  localStorage.setItem('claude_api_key', document.getElementById('claudeKey').value.trim());
  localStorage.setItem('slack_webhook', document.getElementById('slackWebhook').value.trim());
  showToast('✅ 設定を保存しました');
  document.getElementById('settingsPanel').classList.remove('active');
}

// ========== Page switching ==========
function switchPage(page) {
  document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page-content').forEach(c => c.classList.remove('active'));
  if (page === 'new') {
    document.querySelector('.page-tab:nth-child(1)').classList.add('active');
    document.getElementById('pageNew').classList.add('active');
  } else {
    document.querySelector('.page-tab:nth-child(2)').classList.add('active');
    document.getElementById('pageHistory').classList.add('active');
    renderHistory();
  }
}

// ========== File handling ==========
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (file.size > 25 * 1024 * 1024) { showError('⚠️ 25MBを超えています'); return; }
  selectedFile = file;
  uploadArea.classList.add('has-file');
  document.getElementById('uploadPrompt').style.display = 'none';
  document.getElementById('fileInfo').classList.add('active');
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('processBtn').disabled = false;
  hideError();
}
function removeFile(e) {
  e.stopPropagation(); selectedFile = null; fileInput.value = '';
  uploadArea.classList.remove('has-file');
  document.getElementById('uploadPrompt').style.display = '';
  document.getElementById('fileInfo').classList.remove('active');
  document.getElementById('processBtn').disabled = true;
}
function formatSize(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

function selectMode(el) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected'); selectedMode = el.dataset.mode;
}

// ========== Main process ==========
async function processAudio() {
  const groqKey = localStorage.getItem('groq_api_key');
  const claudeKey = localStorage.getItem('claude_api_key');
  if (!groqKey || !claudeKey) { showError('⚙️ APIキーを設定してください'); document.getElementById('settingsPanel').classList.add('active'); return; }
  if (!selectedFile) { showError('🎵 音声ファイルを選択してください'); return; }

  hideError();
  const btn = document.getElementById('processBtn');
  btn.disabled = true; btn.textContent = '⏳ 処理中...';
  document.getElementById('resultSection').classList.remove('active');
  document.getElementById('progressSection').classList.add('active');
  resetProgress();

  try {
    setStepActive(1);
    transcriptText = await transcribeWithGroq(selectedFile, groqKey);
    setStepDone(1);

    setStepActive(2);
    formattedText = await formatWithClaude(transcriptText, selectedMode, claudeKey);
    setStepDone(2);

    // ★ Save to history
    saveToHistory({
      id: Date.now(),
      date: new Date().toISOString(),
      mode: selectedMode,
      title: '',
      fileName: selectedFile.name,
      fileSize: selectedFile.size,
      transcript: transcriptText,
      formatted: formattedText,
    });

    currentTab = 'formatted';
    document.getElementById('resultContent').textContent = formattedText;
    document.getElementById('resultSection').classList.add('active');
    document.querySelectorAll('#resultSection .result-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('#resultSection .result-tab').classList.add('active');

    const slackUrl = localStorage.getItem('slack_webhook');
    if (slackUrl) {
      try { await sendToSlack(slackUrl, formattedText, selectedMode); showToast('📩 Slackにも送信しました'); }
      catch (e) { console.warn('Slack failed:', e); }
    }
  } catch (err) {
    showError('❌ エラー: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false; btn.textContent = '🚀 文字起こし開始';
    setTimeout(() => document.getElementById('progressSection').classList.remove('active'), 1000);
    updateHistoryBadge();
  }
}

// ========== History ==========
function getHistory() {
  try { return JSON.parse(localStorage.getItem('transcribe_history') || '[]'); }
  catch { return []; }
}
function saveToHistory(item) {
  const history = getHistory();
  history.unshift(item);
  // Keep max 100 items to avoid localStorage overflow
  if (history.length > 100) history.length = 100;
  localStorage.setItem('transcribe_history', JSON.stringify(history));
  updateHistoryBadge();
}
function deleteFromHistory(id) {
  const history = getHistory().filter(h => h.id !== id);
  localStorage.setItem('transcribe_history', JSON.stringify(history));
  updateHistoryBadge();
  renderHistory();
}
function updateHistoryBadge() {
  const count = getHistory().length;
  document.getElementById('historyBadge').textContent = count;
}

function renderHistory() {
  const history = getHistory();
  const filtered = currentFilter === 'all' ? history : history.filter(h => h.mode === currentFilter);
  const container = document.getElementById('historyList');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <span class="history-empty-icon">${history.length === 0 ? '📭' : '🔍'}</span>
        <div class="history-empty-text">${history.length === 0 ? 'まだ履歴がありません' : '該当する履歴がありません'}</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(item => {
    const d = new Date(item.date);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const preview = (item.formatted || item.transcript || '').substring(0, 80);
    const displayTitle = item.title || item.fileName || '不明';
    return `
      <div class="history-item" onclick="openHistoryDetail(${item.id})">
        <div class="history-item-header">
          <span class="history-item-mode">${MODE_LABELS[item.mode] || item.mode}</span>
          <span class="history-item-date">${dateStr}</span>
        </div>
        <div class="history-item-title">${escapeHtml(displayTitle)}</div>
        ${item.title ? `<div class="history-item-filename">🎵 ${escapeHtml(item.fileName || '')}</div>` : ''}
        <div class="history-item-preview">${escapeHtml(preview)}...</div>
        <div class="history-item-actions">
          <button class="history-rename" onclick="event.stopPropagation(); renameHistoryItem(${item.id})">✏️ 名前変更</button>
          <button class="history-delete" onclick="event.stopPropagation(); if(confirm('この履歴を削除しますか？')) deleteFromHistory(${item.id})">🗑 削除</button>
        </div>
      </div>`;
  }).join('');
}

function filterHistory(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function openHistoryDetail(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;
  currentHistoryItem = item;
  historyTab = 'formatted';

  const d = new Date(item.date);
  const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

  document.getElementById('historyDetailMeta').innerHTML = `
    <div class="meta-item">📅 <span>${dateStr}</span></div>
    <div class="meta-item">📂 <span>${MODE_LABELS[item.mode]}</span></div>
    <div class="meta-item">🎵 <span>${escapeHtml(item.fileName || '不明')}</span></div>
    <div class="meta-item">📏 <span>${formatSize(item.fileSize || 0)}</span></div>`;

  const displayTitle = item.title || item.fileName || '不明';
  document.getElementById('historyDetailTitle').innerHTML = `
    <div class="title-display-row">
      <span class="title-display-text" id="titleDisplay">${escapeHtml(displayTitle)}</span>
      <button class="title-edit-btn" onclick="startEditTitle()">✏️ 編集</button>
    </div>
    <div class="title-edit-row" id="titleEditRow" style="display:none">
      <input class="title-edit-input" id="titleEditInput" value="${escapeHtml(displayTitle)}" placeholder="タイトルを入力...">
      <button class="title-edit-save" onclick="saveTitleEdit()">保存</button>
    </div>`;
  document.getElementById('historyDetailContent').textContent = item.formatted || item.transcript || '';

  document.querySelectorAll('#historyDetail .result-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('#historyDetail .result-tab').classList.add('active');

  document.getElementById('historyListView').style.display = 'none';
  document.getElementById('historyDetail').classList.add('active');
}

function closeHistoryDetail() {
  document.getElementById('historyDetail').classList.remove('active');
  document.getElementById('historyListView').style.display = '';
  currentHistoryItem = null;
}

function switchHistoryTab(tab) {
  if (!currentHistoryItem) return;
  historyTab = tab;
  document.querySelectorAll('#historyDetail .result-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('historyDetailContent').textContent =
    tab === 'transcript' ? currentHistoryItem.transcript : currentHistoryItem.formatted;
}

function copyHistoryResult() {
  if (!currentHistoryItem) return;
  const t = historyTab === 'transcript' ? currentHistoryItem.transcript : currentHistoryItem.formatted;
  navigator.clipboard.writeText(t).then(() => showToast('📋 コピーしました')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 コピーしました');
  });
}

// ========== Title editing ==========
function renameHistoryItem(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;
  const currentTitle = item.title || item.fileName || '';
  const newTitle = prompt('タイトルを入力してください：', currentTitle);
  if (newTitle !== null && newTitle.trim() !== '') {
    updateHistoryItem(id, { title: newTitle.trim() });
    renderHistory();
    showToast('✏️ タイトルを変更しました');
  }
}

function startEditTitle() {
  document.querySelector('.title-display-row').style.display = 'none';
  document.getElementById('titleEditRow').style.display = 'flex';
  document.getElementById('titleEditInput').focus();
}

function saveTitleEdit() {
  if (!currentHistoryItem) return;
  const newTitle = document.getElementById('titleEditInput').value.trim();
  if (newTitle) {
    updateHistoryItem(currentHistoryItem.id, { title: newTitle });
    currentHistoryItem.title = newTitle;
    document.getElementById('titleDisplay').textContent = newTitle;
  }
  document.querySelector('.title-display-row').style.display = 'flex';
  document.getElementById('titleEditRow').style.display = 'none';
  showToast('✏️ タイトルを変更しました');
}

function updateHistoryItem(id, updates) {
  const history = getHistory();
  const idx = history.findIndex(h => h.id === id);
  if (idx !== -1) {
    Object.assign(history[idx], updates);
    localStorage.setItem('transcribe_history', JSON.stringify(history));
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== APIs ==========
async function transcribeWithGroq(file, apiKey) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('model', 'whisper-large-v3');
  formData.append('language', 'ja');
  formData.append('response_format', 'text');
  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: formData,
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(`Groq: ${err.error?.message || res.statusText}`); }
  return await res.text();
}

async function formatWithClaude(text, mode, apiKey) {
  const prompts = {
    summary: `以下の文字起こしテキストを、要点を押さえた簡潔な要約にまとめてください。\n- 重要なポイントを箇条書きで整理\n- 結論やアクションアイテムがあれば明記\n- 分量は元テキストの1/3程度`,
    karte: `以下の文字起こしテキストを、整骨院の施術カルテ形式に整形してください。\n【患者情報】氏名・年齢・性別（わかる範囲で）\n【主訴】患者の訴え\n【所見】施術者の観察・評価\n【施術内容】実施した施術\n【経過】施術後の変化\n【次回の方針】今後の治療計画\n※ 音声から読み取れない項目は「（記載なし）」としてください`,
    minutes: `以下の文字起こしテキストを議事録形式に整形してください。\n【日時】（わかる範囲で）\n【参加者】（わかる範囲で）\n【議題・テーマ】\n【内容】主要な議論ポイント、決定事項、保留事項\n【アクションアイテム】担当者とタスク\n【次回予定】`,
    blog: `以下の文字起こしテキストをもとに、整骨院のブログ記事の下書きを作成してください。\nターゲット読者は身体の不調を抱える一般の方です。\n【仮タイトル】SEOを意識した魅力的なタイトル案を3つ\n【リード文】読者の悩みに寄り添う導入（100文字程度）\n【本文構成】H2見出しとその内容の概要\n【まとめ】来院を促すCTA\n【想定キーワード】SEO対策キーワード候補`
  };
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:4096,
      messages: [{ role:'user', content:`${prompts[mode]}\n\n---\n【文字起こしテキスト】\n${text}` }]
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(`Claude: ${data.error.message}`);
  return data.content.map(c => c.text || '').join('');
}

async function sendToSlack(url, text, mode) {
  await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text: `${MODE_LABELS[mode]} *AI文字起こし結果*\n\n${text.substring(0,3000)}${text.length>3000?'\n...（続き）':''}` })
  });
}

// ========== UI helpers ==========
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#resultSection .result-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('resultContent').textContent = tab === 'transcript' ? transcriptText : formattedText;
}
function copyResult() {
  const t = currentTab === 'transcript' ? transcriptText : formattedText;
  navigator.clipboard.writeText(t).then(() => showToast('📋 コピーしました')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 コピーしました');
  });
}
function showError(m) { const e = document.getElementById('errorMsg'); e.textContent = m; e.classList.add('active'); }
function hideError() { document.getElementById('errorMsg').classList.remove('active'); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function resetProgress() { ['step1','step2'].forEach(id => { const e = document.getElementById(id); e.classList.remove('active','done'); }); }
function setStepActive(n) { const e = document.getElementById('step'+n); e.classList.add('active'); e.querySelector('.progress-dot').innerHTML = '<div class="spinner"></div>'; }
function setStepDone(n) { const e = document.getElementById('step'+n); e.classList.remove('active'); e.classList.add('done'); e.querySelector('.progress-dot').innerHTML = '✓'; }

// ========== Init ==========
loadSettings();
updateHistoryBadge();
if (!localStorage.getItem('groq_api_key') || !localStorage.getItem('claude_api_key')) {
  document.getElementById('settingsPanel').classList.add('active');
}
</script>
